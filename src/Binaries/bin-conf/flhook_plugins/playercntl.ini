SpinProtectionMultiplier = -1.0
EnableEscort = no
EscortedShipMinimumMass = 100000
EscortedShipDamageFactor = 0.0

[Rename]
RenameCost = 10000000
RenameTimeLimit = 86400
MoveCost = 10000000

[GiveCash]
MinTransfer = 100000
MinTime = 172800 ;48 часов

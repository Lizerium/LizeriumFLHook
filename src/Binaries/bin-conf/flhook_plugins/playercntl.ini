ReportDisconnectingPlayers = yes
KillDisconnectingPlayers = no
LootDisconnectingPlayers = no
HullDropFactor = 0.0001
CargoDropContainer = big_bomb_1_hit_pts
HullDrop1NickName = commod_big_bomb
HullDrop2NickName = commod_big_bomb
DisconnectMsg = %time: %player пытается задействовать маскировочное устройство

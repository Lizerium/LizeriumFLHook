[Settings]
dllname = playercntl.dll
name = Player Control v1.0 by Cannon
shortname = playercntl
maypause = false
mayunload = true

[Restart]
MaxRank = 60
MaxCash = 1000000

[LogItems]
donat_torpedo = donat_torpedo
license_member_ph = license_member_ph

[NewPlayerBanner]
Text = <TRA data="0x40B60002" mask="-1"/><TEXT>Вы можете использовать '/restart parameter' для нового персонажа. Для нового персонажа доступны параметры miner, outcast, corsair, bretonia, gallia, kusari, liberty и rheinland. Введите /helpmenu или /help для получения справки.</TEXT>

[General]
EnableMoveChar = no
EnableRenameMe = yes
EnablePimpShip = yes
EnableRestart = yes
EnableGiveCash = yes
RepDropCost = 350000
StuckMsg = Внимание! Держитесь подальше. Буксировка %player

; Эти меню были созданы Dvurechensky.
[Config]
Enabled = yes

; СИНТАКСИС: help = command, Title, XML String
; Пример: help = test, A Test, <TEXT>A quick test</TEXT>
; Чтобы использовать эту команду, мы должны ввести /helpmenu test.
; Строка XML должна быть допустимой, иначе меню не будет работать должным образом.
; Каждое меню имеет максимальный размер 4000 символов. (Это все, от команды до строки XML)
; Если у вас есть что-то больше этого размера, либо сократите его до менее 4000, либо разделите на несколько команд.

[Commands]
help = commands, Все команды, <TEXT>Ниже приведен список всех команд, доступных для использования в Lizerium. В некоторых случаях для работы команд не требуются параметры. Примером этого может быть '/time'.</TEXT><PARA/><PARA/><TRA data="0x00FFFF00" mask="-1"/><TEXT>Денежные команды: </TEXT><TRA data="0x4000FF08" mask="-2"/><TEXT>/givecash, /givecasht, /set cashcode, /drawcash, /showcash.</TEXT><PARA/><PARA/><TRA data="0x00FFFF00" mask="-1"/><TEXT>Команды чата: /l, /s, /g, /r, /fm, /pm, /mail, /ignore, /delignore, /ignored.</TEXT><PARA/><PARA/><TEXT>Команды конфигурации: /set chatfont, /set chattime, /set diemsg, /set diemsgsize .</TEXT><PARA/><PARA/><TEXT>Групповые команды:  /join, /leave, /i, /invite, /fi, /marktarget, /target.</TEXT><PARA/><PARA/><TEXT>Прыжковые двигатели: /charge, /jump, /setcoords, /jumpbeacon, /beacon, /survey, /jumpsys.</TEXT><PARA/><PARA/><TEXT>Разные команды: /renameme, /id, /ids, /time, /conn, /return, /movechar, /ping, /pingtarget, /help, /helpmenu, /laws, /checkcargo, /rules, /start.</TEXT><PARA/><PARA/><TEXT>Команды базы игроков: Пожалуйста, введите /helpmenu pobs для получения информации о PoB..</TEXT><PARA/><PARA/><TEXT>Корабельные команды: /lights, /shields, /pos, /coin, /dice, /stuck, /autobuy, /droprep, /cloak, /disruptor, /nodock, /police, /set movecharcode, /si, /setinfo, /showinfo.</TEXT><PARA/><PARA/><TEXT>Команды тегов: /maketag, /droptag, /settagpass.</TEXT><PARA/><PARA/><TEXT>Посмотрите /helpmenu jump для статистики по прыжкам.</TEXT><PARA/><TEXT>Посмотрите /helpmenu cloaks для статистики маскирующих устройств.</TEXT><PARA/><TEXT>Посмотрите /helpmenu cloakdisrupt для получения статистики по разрушителям невидимости.</TEXT><PARA/>